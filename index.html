// ── Fetch live data from Vercel proxy ─────────────────────────────────────────
async function fetchScreener(tab) {
  try {
    const r = await fetch(`/api/screener?tab=${tab.id}`);
    if (r.ok) {
      const json = await r.json();
      const stocks = json.quotes || [];
      if (stocks.length > 0) return { stocks, source: "Live · Yahoo Finance" };
    }
  } catch (_) {}
  throw new Error("Could not fetch live data.");
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [activeTab,    setActiveTab]    = useState("gainers");
  const [stocks,       setStocks]       = useState([]);
  const [loading,      setLoading]      = useState(false);
  const [dataSource,   setDataSource]   = useState("");
  const [lastUpdated,  setLastUpdated]  = useState(null);
  const [sectorFilter, setSectorFilter] = useState("All");
  const [sortCol,      setSortCol]      = useState(null);
  const [sortDir,      setSortDir]      = useState("desc");
  const [countdown,    setCountdown]    = useState(300);
  const countRef = useRef(null);
  const autoRef  = useRef(null);

  const load = useCallback(async (tabId) => {
    const tab = TABS.find(t => t.id === tabId);
    if (!tab) return;
    setLoading(true);
    try {
      const { stocks: s, source: src } = await fetchScreener(tab);
      setStocks(s);
      setDataSource(src);
    } catch (_) {
      const fb = FALLBACK[tabId] || FALLBACK.gainers;
      setStocks(fb);
      setDataSource(`Cached · ${FETCH_TS}`);
    }
    setLastUpdated(new Date());
    setCountdown(300);
    setLoading(false);
  }, []);

  useEffect(() => {
    setSortCol(null); setSectorFilter("All");
    load(activeTab);
  }, [activeTab]);

  useEffect(() => {
    autoRef.current  = setInterval(() => load(activeTab), 300_000);
    countRef.current = setInterval(() => setCountdown(c => c <= 1 ? 300 : c - 1), 1000);
    return () => { clearInterval(autoRef.current); clearInterval(countRef.current); };
  }, [activeTab, load]);

  const sectors = useMemo(() =>
    ["All",...Array.from(new Set(stocks.map(s=>s.sector).filter(Boolean))).sort()],
    [stocks]);

  const display = useMemo(() => {
    let list = [...stocks];
    if (activeTab === "overbought") list = list.filter(s => s.RSI != null && s.RSI > 70);
    if (activeTab === "oversold")   list = list.filter(s => s.RSI != null && s.RSI < 30);
    if (sectorFilter !== "All")     list = list.filter(s => s.sector === sectorFilter);
    return list.sort((a,b) => {
      if (!sortCol) return 0;
      const av = a[sortCol] ?? (sortDir==="desc"?-Infinity:Infinity);
      const bv = b[sortCol] ?? (sortDir==="desc"?-Infinity:Infinity);
      return sortDir==="desc" ? bv-av : av-bv;
    });
  }, [stocks, activeTab, sectorFilter, sortCol, sortDir]);

  const handleSort = col => {
    if (sortCol===col) setSortDir(d=>d==="desc"?"asc":"desc");
    else { setSortCol(col); setSortDir("desc"); }
  };

  const fmtTime = d => d ? d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:true}) : "—";
  const fmtCD   = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

  return (
    <div style={{minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0c1420,#101c2c)",borderBottom:"1px solid #1a2f48",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"12px"}}>
        <div>
          <div style={{fontSize:"20px",fontWeight:700,letterSpacing:"0.06em",color:"#e0f0ff"}}>
            NIFTY 500 <span style={{color:"#00e87c"}}>LIVE</span> SCREENER
          </div>
          <div style={{fontSize:"10px",color:"#4a7090",marginTop:"3px"}}>
            NSE India · {display.length} stocks · {dataSource}
          </div>
        </div>
        <div style={{display:"flex",gap:"10px",alignItems:"center",flexWrap:"wrap"}}>
          <div style={{textAlign:"right",fontSize:"10px",color:"#2a4458",lineHeight:1.7}}>
            {lastUpdated && <>Updated <span style={{color:"#4488aa"}}>{fmtTime(lastUpdated)}</span></>}
            <br/><span style={{color:"#1e3040"}}>↻ next in {fmtCD(countdown)}</span>
          </div>
          <button
            onClick={() => load(activeTab)}
            disabled={loading}
            style={{padding:"6px 16px",fontSize:"12px",borderRadius:"4px",background:loading?"#0c1520":"#0a2035",border:"1px solid #1a5070",color:loading?"#2a4050":"#44aaee"}}
          >{loading ? <span className="spinner">⟳</span> : "↻ Refresh"}</button>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",overflowX:"auto",borderBottom:"1px solid #111d2a",background:"#080c14"}}>
        {TABS.map(t => (
          <button key={t.id}
            onClick={() => setActiveTab(t.id)}
            style={{padding:"10px 18px",background:activeTab===t.id?"#0c1c2e":"transparent",borderBottom:activeTab===t.id?"2px solid #007acc":"2px solid transparent",color:activeTab===t.id?"#55aadd":"#3a6070",fontSize:"12px",whiteSpace:"nowrap",letterSpacing:"0.03em"}}
          >{t.label}</button>
        ))}
      </div>

      {/* Sector filter */}
      {sectors.length > 1 && (
        <div style={{padding:"9px 18px",background:"#080c14",borderBottom:"1px solid #0e1820",display:"flex",gap:"6px",alignItems:"center",flexWrap:"wrap"}}>
          <span style={{color:"#5a8099",fontSize:"10px",letterSpacing:"0.08em",marginRight:"4px"}}>SECTOR</span>
          {sectors.map(s => (
            <button key={s} onClick={() => setSectorFilter(s)} style={{
              padding:"3px 10px",fontSize:"11px",borderRadius:"3px",
              background:sectorFilter===s?"#0a2a40":"#0d1a26",
              border:`1px solid ${sectorFilter===s?"#2a7090":"#2a4a60"}`,
              color:sectorFilter===s?"#44bbee":"#7ab0cc",
            }}>{s}</button>
          ))}
        </div>
      )}

      {/* Loading */}
      {loading && (
        <div style={{padding:"60px",textAlign:"center",color:"#2a4050"}}>
          <div className="spinner" style={{fontSize:"28px",display:"block",marginBottom:"10px"}}>⟳</div>
          <div style={{letterSpacing:"0.12em",fontSize:"12px"}}>FETCHING LIVE DATA…</div>
          <div style={{fontSize:"10px",marginTop:"5px",color:"#1e3040"}}>Yahoo Finance · NSE India</div>
        </div>
      )}

      {/* Table */}
      {!loading && display.length > 0 && (
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px"}}>
            <thead>
              <tr style={{background:"#0a1420",borderBottom:"1px solid #131e2c",position:"sticky",top:0}}>
                <th style={{padding:"8px 10px 8px 18px",textAlign:"left",color:"#1a2d3a",fontSize:"10px",width:"32px"}}>#</th>
                {COLS.map(col => (
                  <th key={col.key} onClick={() => handleSort(col.key)} style={{
                    padding:"8px 10px",textAlign:col.align,fontSize:"10px",letterSpacing:"0.07em",
                    cursor:"pointer",userSelect:"none",whiteSpace:"nowrap",
                    color:sortCol===col.key?"#44aaee":"#2a4a5a",
                  }}>
                    {col.label}{sortCol===col.key?(sortDir==="desc"?" ▼":" ▲"):""}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {display.map((s,i) => (
                <tr key={s.name+i} style={{borderBottom:"1px solid #0c1620",background:i%2===0?"#070a0f":"#090d16"}}>
                  <td style={{padding:"8px 10px 8px 18px",color:"#182530",fontSize:"10px"}}>{i+1}</td>
                  {COLS.map(col => {
                    const val = s[col.key];
                    const color = col.color ? col.color(val) : "#99aabb";
                    return (
                      <td key={col.key} style={{padding:"8px 10px",textAlign:col.align,color,whiteSpace:"nowrap"}}>
                        {col.key==="name"
                          ? <strong style={{letterSpacing:"0.04em"}}>{col.fmt(val)}</strong>
                          : col.fmt(val)}
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* Empty */}
      {!loading && display.length===0 && (
        <div style={{padding:"40px",textAlign:"center",color:"#1e3040"}}>No stocks match this filter.</div>
      )}

      {/* Footer */}
      <div style={{padding:"10px 20px",borderTop:"1px solid #0c1620",fontSize:"10px",color:"#1a2d3a",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:"6px"}}>
        <span>NSE India · Auto-refreshes every 5 min · For informational purposes only</span>
        <span>RSI: &gt;70 Overbought · &lt;30 Oversold · Vol/Avg = vs 10-day average</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
